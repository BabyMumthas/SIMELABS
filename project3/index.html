<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Prata&family=Volkhov:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>




<body>
    <div class="landing-page">
        <div class="container">
            <div class="navbar d-flex ">
                <div class="logo mt-4">
                    <img src="images/Panto.png" alt="Panto">
                </div>
                <div class="items d-flex gap-5 mt-4">
                    <p>Furniture</p>
                    <p>Shop</p>
                    <p>About Us</p>
                    <p>Contact</p>
                </div>
                <div class="cart mt-4">
                    <i class="fa-solid fa-bag-shopping"></i>
                </div>
            </div>
            <div class="hero-section d-flex gap-3">
                <h1 class="head mt-5">Make Your Interior More<br>Minimalistic & Modern</h1>
                <p>Turn your room with panto into a lot more minimalist<br>and mordern with ease and speed</p>
                <form class="d-flex align-items-center justify-content-center gap-4">
                    <div class="search-box">
                        <input type="text" class="input-in " placeholder="Search furniture">
                        <button>
                            <i class="fa-solid fa-magnifying-glass" style="color: rgb(246, 249, 255);"></i>
                        </button>

                    </div>



                </form>






            </div>





        </div>
    </div>


































    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
